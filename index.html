<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>刮紙產生器｜日期自動編碼修正版</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --page-width: 297mm;
      --page-height: 210mm;

      /* 增加安全邊界，避免列印太貼邊 */
      --content-width: 272mm;
      --grid-width: 272mm;
      --grid-height: 138mm;

      --cell-border: 1.5px solid #333;
      --number-font-size: 22px;
    }

    body {
      margin: 0;
      background: #ececec;
      color: #111;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    .controls {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      align-items: center;
      padding: 12px 16px;
      background: #111;
      color: #fff;
      box-shadow: 0 3px 14px rgba(0,0,0,.2);
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      white-space: nowrap;
    }

    .controls input[type="number"],
    .controls select {
      width: 125px;
      padding: 6px 8px;
      border: 0;
      border-radius: 6px;
      font-family: inherit;
    }

    .hint {
      font-size: 13px;
      opacity: .85;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 8px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary { background: #ffe500; color: #111; }
    .btn-white { background: #fff; color: #111; }
    .btn-danger { background: #ff5b5b; color: #fff; }

    .preview { padding: 20px; }

    .sheet {
      width: var(--page-width);
      min-height: var(--page-height);
      margin: 0 auto 24px;
      background: #fff;
      padding: 8mm 12.5mm 8mm;
      box-shadow: 0 4px 20px rgba(0,0,0,.18);
      page-break-after: always;
      overflow: hidden;
    }

    .header-wrap {
      width: var(--content-width);
      margin: 0 auto 4mm;
      position: relative;
      line-height: 0;
    }

    .header-image {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 疊在粉紅框中的說明內容 */
    .overlay-info {
      position: absolute;
      left: 28.6%;
      top: 1.0%;
      width: 28.6%;
      height: 95%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.15;
      color: #111;
      pointer-events: none;
    }

    .overlay-info .main {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .overlay-info .sub {
      font-size: 13px;
      font-weight: 800;
      max-width: 95%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .grid-info {
      width: var(--grid-width);
      margin: -0.5mm auto 1.8mm;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #777;
    }

    .grid-wrap {
      width: var(--grid-width);
      height: var(--grid-height);
      margin: 0 auto;
      overflow: hidden;
    }

    .grid {
      display: grid;
      width: 100%;
      height: 100%;
      border-left: var(--cell-border);
      border-top: var(--cell-border);
    }

    .cell {
      border-right: var(--cell-border);
      border-bottom: var(--cell-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--number-font-size);
      font-weight: 900;
      color: #111;
      line-height: 1;
      overflow: hidden;
      white-space: nowrap;
    }

    .cell.empty { color: transparent; }

    @media print {
      @page {
        size: A4 landscape;
        margin: 0;
      }

      html, body {
        background: #fff;
        width: var(--page-width);
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .controls { display: none !important; }
      .preview { padding: 0; }

      .sheet {
        width: var(--page-width);
        height: var(--page-height);
        min-height: var(--page-height);
        margin: 0;
        box-shadow: none;
        overflow: hidden;
      }

      .sheet:last-child { page-break-after: auto; }
    }
  </style>
</head>
<body>
  <div class="controls">
    <label>刮數
      <input id="countInput" type="number" min="1" max="999" value="40" />
    </label>

    <label>編碼類型
      <select id="codePrefixInput">
        <option value="A" selected>A 現場</option>
        <option value="C">C 直播</option>
      </select>
    </label>

    <label>目前起始流水號
      <input id="codeStartInput" type="number" min="1" max="999" value="1" />
    </label>

    <label>排列模式
      <select id="layoutModeInput">
        <option value="auto" selected>自動排列</option>
        <option value="manual">手動欄數</option>
      </select>
    </label>

    <label>手動欄數
      <input id="columnInput" type="number" min="1" max="40" value="8" />
    </label>

    <label>產出張數
      <input id="pageInput" type="number" min="1" max="100" value="1" />
    </label>

    <button class="btn-primary" onclick="generateSheets()">重新跳號</button>
    <button class="btn-white" onclick="printSheets()">列印並遞增編碼</button>
    <button class="btn-danger" onclick="resetCurrentPrefixCode()">重設目前類型編號</button>

    <span class="hint">編碼格式：A1150624001（自動抓當天民國年月日＋三碼流水號）。</span>
  </div>

  <main id="sheetContainer" class="preview"></main>

  <script>
    const $ = (id) => document.getElementById(id);
    const countInput = $("countInput");
    const codePrefixInput = $("codePrefixInput");
    const codeStartInput = $("codeStartInput");
    const layoutModeInput = $("layoutModeInput");
    const columnInput = $("columnInput");
    const pageInput = $("pageInput");
    const sheetContainer = $("sheetContainer");
    let isPrintingByButton = false;

    function getRocDateCode(date = new Date()) {
      const rocYear = date.getFullYear() - 1911;
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${rocYear}${month}${day}`;
    }

    function getOutputFileName() {
      const count = Math.max(1, Math.min(999, Number(countInput.value) || 40));
      return `(${count})刮-${getRocDateCode()}`;
    }

    function updateOutputFileName() {
      document.title = getOutputFileName();
    }

    function getNextKey(prefix, dateCode = getRocDateCode()) {
      return `kuji_img_header_v3_next_serial_${prefix}_${dateCode}`;
    }

    function getNextSerial(prefix) {
      return Math.max(1, Number(localStorage.getItem(getNextKey(prefix))) || 1);
    }

    function setNextSerial(prefix, serial) {
      localStorage.setItem(getNextKey(prefix), String(Math.max(1, Number(serial) || 1)));
    }

    function syncStartInputWithPrefix() {
      codeStartInput.value = getNextSerial(codePrefixInput.value);
    }

    function saveSettings() {
      const settings = {
        count: countInput.value,
        prefix: codePrefixInput.value,
        layoutMode: layoutModeInput.value,
        columns: columnInput.value,
        pages: pageInput.value
      };
      localStorage.setItem("kuji_img_header_v3_settings", JSON.stringify(settings));
      setNextSerial(codePrefixInput.value, codeStartInput.value);
    }

    function loadSettings() {
      const raw = localStorage.getItem("kuji_img_header_v3_settings");
      if (!raw) {
        syncStartInputWithPrefix();
        return;
      }
      try {
        const settings = JSON.parse(raw);
        countInput.value = settings.count || 40;
        codePrefixInput.value = settings.prefix || "A";
        layoutModeInput.value = settings.layoutMode || "auto";
        columnInput.value = settings.columns || 8;
        pageInput.value = settings.pages || 1;
      } catch (e) {
        console.warn("讀取設定失敗", e);
      }
      syncStartInputWithPrefix();
    }

    function updateColumnInputState() {
      columnInput.disabled = layoutModeInput.value !== "manual";
      columnInput.style.opacity = columnInput.disabled ? "0.55" : "1";
    }

    function randomIndex(maxExclusive) {
      const arr = new Uint32Array(1);
      crypto.getRandomValues(arr);
      return arr[0] % maxExclusive;
    }

    function shuffle(array) {
      const result = [...array];
      for (let i = result.length - 1; i > 0; i--) {
        const j = randomIndex(i + 1);
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    function numberPadLength(count) {
      return Math.max(2, String(count).length);
    }

    function formatSerial(prefix, serial) {
      return `${prefix}${getRocDateCode()}${String(serial).padStart(3, "0")}`;
    }

    function calcFontSize(rows, columns) {
      const basedOnWidth = 190 / Math.max(columns, 1);
      const basedOnHeight = 122 / Math.max(rows, 1);
      const size = Math.min(basedOnWidth, basedOnHeight);
      return Math.max(8, Math.min(27, Math.floor(size)));
    }

    function findBestAutoGrid(count) {
      if (count <= 40) {
        return { columns: Math.ceil(count / 5), rows: 5 };
      }
      const targetAspect = 272 / 138;
      let best = null;
      for (let columns = 1; columns <= Math.min(count, 40); columns++) {
        const rows = Math.ceil(count / columns);
        const totalCells = columns * rows;
        const emptyCells = totalCells - count;
        const aspect = columns / rows;
        const score =
          (emptyCells * 1000) +
          (Math.abs(aspect - targetAspect) * 100) +
          (Math.abs(rows - 8) * 3);
        if (!best || score < best.score) {
          best = { columns, rows, score };
        }
      }
      return best;
    }

    function getLayout(count) {
      if (layoutModeInput.value === "manual") {
        const columns = Math.max(1, Math.min(40, Number(columnInput.value) || 8));
        const rows = Math.ceil(count / columns);
        return { columns, rows };
      }
      return findBestAutoGrid(count);
    }

    function createNumberCells(count, totalCells) {
      const numbers = shuffle(Array.from({ length: count }, (_, i) => i + 1));
      while (numbers.length < totalCells) numbers.push("");
      const pad = numberPadLength(count);
      return numbers.map((num) => {
        const text = num === "" ? "" : String(num).padStart(pad, "0");
        return `<div class="cell ${num === "" ? "empty" : ""}">${text}</div>`;
      }).join("");
    }

    function getBatchCode(index) {
      const prefix = codePrefixInput.value;
      const start = Math.max(1, Number(codeStartInput.value) || 1);
      return formatSerial(prefix, start + index);
    }

    function createSheet(index) {
      const count = Math.max(1, Math.min(999, Number(countInput.value) || 40));
      const layout = getLayout(count);
      const totalCells = layout.columns * layout.rows;
      const fontSize = calcFontSize(layout.rows, layout.columns);
      const code = getBatchCode(index);

      const section = document.createElement("section");
      section.className = "sheet";
      section.innerHTML = `

          <span>${count} 刮｜編碼：${code}</span>
          <span>${layout.columns} 欄 × ${layout.rows} 列${layoutModeInput.value === "auto" ? "｜自動排列" : "｜手動欄數"}</span>
        </div>

        <div class="grid-wrap">
          <div class="grid" style="grid-template-columns: repeat(${layout.columns}, 1fr); grid-template-rows: repeat(${layout.rows}, 1fr); --number-font-size: ${fontSize}px;">

      `;
      return section;
    }

    function getPageCount() {
      return Math.max(1, Math.min(100, Number(pageInput.value) || 1));
    }

    function advanceSerialAfterPrint() {
      const prefix = codePrefixInput.value;
      const start = Math.max(1, Number(codeStartInput.value) || 1);
      const pages = getPageCount();
      const next = start + pages;
      setNextSerial(prefix, next);
      codeStartInput.value = next;
      saveSettings();
    }

    function generateSheets() {
      saveSettings();
      updateColumnInputState();
      updateOutputFileName();
      const pages = getPageCount();
      sheetContainer.innerHTML = "";
      for (let i = 0; i < pages; i++) {
        sheetContainer.appendChild(createSheet(i));
      }
    }

    function printSheets() {
      isPrintingByButton = true;
      generateSheets();
      updateOutputFileName();
      setTimeout(() => window.print(), 120);
    }

    function resetCurrentPrefixCode() {
      const prefix = codePrefixInput.value;
      const ok = confirm(`確定要把今天 ${prefix}${getRocDateCode()} 的下一個流水號重設為 001 嗎？`);
      if (!ok) return;
      setNextSerial(prefix, 1);
      codeStartInput.value = 1;
      generateSheets();
    }

    window.addEventListener("beforeprint", () => {
      generateSheets();
    });

    window.addEventListener("afterprint", () => {
      if (!isPrintingByButton) return;
      advanceSerialAfterPrint();
      isPrintingByButton = false;
      generateSheets();
    });

    codePrefixInput.addEventListener("change", () => {
      syncStartInputWithPrefix();
      generateSheets();
    });

    codeStartInput.addEventListener("input", () => {
      setNextSerial(codePrefixInput.value, codeStartInput.value);
      generateSheets();
    });

    [countInput, layoutModeInput, columnInput, pageInput].forEach(el => {
      el.addEventListener("input", generateSheets);
      el.addEventListener("change", generateSheets);
    });

    loadSettings();
    updateColumnInputState();
    generateSheets();
  </script>
